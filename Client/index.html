<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
        {
           "imports": {
                "three": "./node_modules/three/build/three.module.js",
                "three/addons/": "./node_modules/three/examples/jsm/",
                "lil-gui": "./node_modules/lil-gui/dist/lil-gui.esm.min.js",
                "socket.io-client": "./node_modules/socket.io-client/dist/socket.io.esm.min.js"
            }
        }
    </script>
    <title>Warships</title>
</head>
<body>
    <div id="crosshair"></div>
    <canvas class="webgl"></canvas>
    <script type="module" src="./script.js"></script>

    <!-- CHANGED: Respawn screen styled -->
    <div id="deathscreen">
        <div id="deathscreenContent">
            <h2>YOU SANK</h2>
            <div id="deathscreenplay">RESPAWN</div>
        </div>
    </div>

    <!-- CHANGED: Personal stats box (top left) -->
    <div id="personalStats">
        <div id="playerNameDisplay">Player</div>
        <div class="statRow"><span>Kills:</span> <span id="killCount">0</span></div>
        <div class="statRow"><span>Damage:</span> <span id="damageCount">0</span></div>
        <div class="statRow"><span>Coins:</span> <span id="coinCount">0</span> 🪙</div>
    </div>

    <!-- CHANGED: Upgrades panel -->
    <div id="upgradesPanel">
        <div class="upgradeTitle">UPGRADES (keys 5-0)</div>
        <div class="upgradeRow" data-stat="speed">
            <span class="upgradeName">Speed [5]</span>
            <div class="upgradeBarContainer">
                <div class="upgradeBarFill" id="upgrade-speed"></div>
            </div>
            <span class="upgradeCost">50🪙</span>
        </div>
        <div class="upgradeRow" data-stat="turnSpeed">
            <span class="upgradeName">Turn Speed [6]</span>
            <div class="upgradeBarContainer">
                <div class="upgradeBarFill" id="upgrade-turnSpeed"></div>
            </div>
            <span class="upgradeCost">50🪙</span>
        </div>
        <div class="upgradeRow" data-stat="acceleration">
            <span class="upgradeName">Acceleration [7]</span>
            <div class="upgradeBarContainer">
                <div class="upgradeBarFill" id="upgrade-acceleration"></div>
            </div>
            <span class="upgradeCost">50🪙</span>
        </div>
        <div class="upgradeRow" data-stat="apDamage">
            <span class="upgradeName">AP Damage [8]</span>
            <div class="upgradeBarContainer">
                <div class="upgradeBarFill" id="upgrade-apDamage"></div>
            </div>
            <span class="upgradeCost">50🪙</span>
        </div>
        <div class="upgradeRow" data-stat="heDamage">
            <span class="upgradeName">HE Damage [9]</span>
            <div class="upgradeBarContainer">
                <div class="upgradeBarFill" id="upgrade-heDamage"></div>
            </div>
            <span class="upgradeCost">50🪙</span>
        </div>
        <div class="upgradeRow" data-stat="health">
            <span class="upgradeName">Health [0]</span>
            <div class="upgradeBarContainer">
                <div class="upgradeBarFill" id="upgrade-health"></div>
            </div>
            <span class="upgradeCost">50🪙</span>
        </div>
    </div>

    <!-- CHANGED: Right panel containing leaderboard and kill feed -->
    <div id="rightPanel">
        <div id="leaderboard">
            <div id="leaderboardTitle">TOP 10</div>
            <div id="leaderboardList"></div>
        </div>
        <div id="killFeed"></div>
    </div>

    <!-- CHANGED: Chat (bottom left) -->
    <div id="chatContainer">
        <div id="chatMessages"></div>
        <input type="text" id="chatInput" placeholder="Press Enter to chat" autocomplete="off" disabled />
    </div>

    <div id="hp">
        <div id="healthbar">
            <div id="actualhp"></div>
            <div id="whitehp"></div>
        </div>
        <div id="heart"></div>
        <div id="he">
            <p id="texthe">HE</p>
            <p id="text2">2</p>
        </div>
        <div id="ap">
            <p id="textap">AP</p>
            <p id="text1">1</p>
        </div>
        <div id="heal">
            <p id="text3">3</p>
        </div>
        <div id="repair">
            <p id="text4">4</p>
        </div>
    </div>
    
    <div id="minimap">
        <div id="mappointer"></div>
        <table id="grid">
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!-- Old stats box commented out -->
    <!--
    <div id="stats">
        <p id="kills"></p>
        <p id="damage"></p>
    </div>
    -->

    <div id="homepage">
        <div id="mainmenu">
            <div id="floatField">
                <input type="text" id="nicknameInput" placeholder="Nickname" autocomplete="off">
                <label for="nicknameInput" id="nicknameLabel">Nickname</label>
            </div>
            <div id="mainmenuplaybutton">
                <p id="PLAY">PLAY</p>
            </div>
        </div>
    </div>
</body>
</html>
